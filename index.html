<html lang="en">
<head>

  <meta property="og:description" content="AI agents that actually ship. Links, socials, and booking.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(0,212,255,0.4);
      --accent: #00d4ff;
      --accent-glow: rgba(0,212,255,0.15);
      --text: #f0f0f0;
      --text-dim: rgba(255,255,255,0.5);
    }

    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Atmosphere */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 48px 20px 40px;
    }

    /* Profile */
    .profile {
      text-align: center;
      margin-bottom: 36px;
    }

    .avatar-ring {
      position: relative;
      display: inline-block;
      margin-bottom: 16px;
    }

    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #0066ff);
      opacity: 0.5;
      filter: blur(12px);
      animation: glow 3s ease-in-out infinite;
    }

    .avatar {
      position: relative;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 2px solid rgba(0,212,255,0.5);
      background: linear-gradient(135deg, #0d1117, #161b22);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .avatar svg {
      opacity: 0.6;
    }

    .name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .tagline {
      font-size: 13px;
      color: var(--accent);
      opacity: 0.7;
      margin-top: 4px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      text-decoration: none;
      color: var(--text);
      transition: all 0.25s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .link:hover, .link:active {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      transform: translateY(-1px);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
    }

    .link-icon.accent-bg {
      background: rgba(0,212,255,0.1);
    }

    .link-text {
      flex: 1;
      min-width: 0;
    }

    .link-title {
      font-size: 14px;
      font-weight: 600;
    }

    .link-desc {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .link-arrow {
      color: rgba(255,255,255,0.15);
      flex-shrink: 0;
      transition: color 0.25s;
    }

    .link:hover .link-arrow {
      color: var(--accent);
    }

    /* Divider */
    .divider {
      width: 32px;
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 8px auto;
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 36px;
      font-size: 11px;
      color: rgba(255,255,255,0.2);
    }

    @keyframes glow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }

    /* Stagger animation */
    .link { opacity: 0; animation: slideUp 0.4s ease forwards; }
    .link:nth-child(1) { animation-delay: 0.1s; }
    .link:nth-child(2) { animation-delay: 0.15s; }
    .link:nth-child(3) { animation-delay: 0.2s; }
    .link:nth-child(4) { animation-delay: 0.25s; }
    .link:nth-child(5) { animation-delay: 0.3s; }
    .link:nth-child(6) { animation-delay: 0.35s; }
    .link:nth-child(7) { animation-delay: 0.4s; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
